services:
  db:
    image: postgres:16-alpine
    container_name: masrofy-mini-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-masrofy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d masrofy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: masrofy-mini-backend:latest
    container_name: masrofy-mini-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/masrofy_db}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    image: masrofy-mini-frontend:latest
    container_name: masrofy-mini-frontend
    depends_on:
      - backend
    ports:
      - "3000:443"

volumes:
  postgres_data: